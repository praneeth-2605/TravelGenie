<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin:0; padding:0; background: transparent; overflow:hidden; }
  #hero { position: relative; width: 100%; height: 420px; }
  #label {
    position:absolute; top:24px; left:32px;
    font-family: Georgia, serif; font-size: 15px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #8A6F5C; font-weight: 500;
  }
</style>
</head>
<body>
<div id="hero"><div id="label">Wandering the globe, one itinerary at a time</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('hero');
const width = container.clientWidth || 800, height = 420;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
camera.position.set(0, 0.4, 5.4);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1.8, 28, 20),
  new THREE.MeshBasicMaterial({ color: 0xD97757, wireframe: true, transparent: true, opacity: 0.55 })
);
scene.add(globe);
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.78, 24, 18),
  new THREE.MeshBasicMaterial({ color: 0xF4F1EA, transparent: true, opacity: 0.85 })
));

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI/180, theta = (lon + 180) * Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
const pinCoords = [[35.68,139.69],[41.0,28.98],[-33.87,151.21],[40.71,-74.0],[-13.16,-72.55]];
const pinGroup = new THREE.Group();
const pinMat = new THREE.MeshBasicMaterial({ color: 0xB85C38 });
pinCoords.forEach(([lat,lon]) => {
  const pin = new THREE.Mesh(new THREE.SphereGeometry(0.045,10,10), pinMat);
  pin.position.copy(latLonToVec3(lat,lon,1.83));
  pinGroup.add(pin);
});
scene.add(pinGroup);

function makeArc(a,b){
  const start=latLonToVec3(a[0],a[1],1.83), end=latLonToVec3(b[0],b[1],1.83);
  const mid=start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(2.35);
  const pts=new THREE.QuadraticBezierCurve3(start,mid,end).getPoints(40);
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineDashedMaterial({color:0xD97757,dashSize:0.06,gapSize:0.05,transparent:true,opacity:0.8});
  const line=new THREE.Line(geo,mat); line.computeLineDistances(); return line;
}
scene.add(makeArc(pinCoords[0],pinCoords[3]));
scene.add(makeArc(pinCoords[1],pinCoords[2]));
scene.add(makeArc(pinCoords[3],pinCoords[4]));

function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y += 0.0028;
  pinGroup.rotation.y += 0.0028;
  scene.children.forEach(c => { if (c.isLine) c.rotation.y += 0.0028; });
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  const w = container.clientWidth || 800;
  camera.aspect = w/height; camera.updateProjectionMatrix();
  renderer.setSize(w, height);
});
</script>
</body>
</html>
